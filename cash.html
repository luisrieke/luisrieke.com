<body>

    <button class="button" onclick="window.location.href='/';">← back home</button>

    <section id="main">

        <div class="headline">
            <p>How to send me money 💸</p>
        </div>

        <div class="inner">

            <section id="one" class="wrapper style1">

                <header class="special">

                    <h2>PayPal / Revolut / Wise</h2>
                    <div class="payment-buttons">
                        <a href="https://www.paypal.com/paypalme/luisrieke" class="calendar-button"
                            target="_blank">PayPal / luisrieke</a>
                        <a href="https://revolut.me/luisrieke" class="calendar-button" target="_blank">Revolut /
                            luisrieke</a>
                        <a href="https://wise.com/pay/me/luisraphaelr" class="calendar-button" target="_blank">Wise /
                            luisraphaelr</a>
                    </div>

                    <h2>Bitcoin</h2>
                    <div class="text-inner payment-detail">
                        <div class="copyable-row">
                            <span id="key" class="copyable-value">13LyiVSk3rFyMiFNJshAwP1fLY8RWcjsCH</span>
                            <button id="copyKey" class="copy-btn" type="button" title="Copy to clipboard">Copy</button>
                        </div>
                    </div>

                    <h2>Bank transfer</h2>
                    <div class="text-inner payment-detail">
                        <div class="copyable-row">
                            <span id="name" class="copyable-value">Luis Rieke</span>
                            <button id="copyName" class="copy-btn" type="button" title="Copy to clipboard">Copy</button>
                        </div>
                        <div class="copyable-row">
                            <span id="iban" class="copyable-value">DE51120300001033611912</span>
                            <button id="copyIban" class="copy-btn" type="button" title="Copy to clipboard">Copy</button>
                        </div>
                        <div class="copyable-row">
                            <span id="bic" class="copyable-value">BYLADEM1001</span>
                            <button id="copyBic" class="copy-btn" type="button" title="Copy to clipboard">Copy</button>
                        </div>
                        <div class="copyable-row">
                            <span id="bank" class="copyable-value">Deutsche Kreditbank</span>
                            <button id="copyBank" class="copy-btn" type="button" title="Copy to clipboard">Copy</button>
                        </div>
                    </div>

                </header>
            </section>
        </div>
    </section>

    <script>
        const copyToClipboard = async (text, btn) => {
            try {
                await navigator.clipboard.writeText(text);
                const originalText = btn.textContent;
                btn.textContent = "Copied!";
                btn.classList.add("copy-success");
                btn.setAttribute("title", "Copied! ✅");
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove("copy-success");
                    resetTooltip(btn);
                }, 2000);
            } catch (err) {
                btn.setAttribute("title", "Copy failed");
            }
        };
        const resetTooltip = (btn) => btn.setAttribute("title", "Copy to clipboard");

        document.getElementById("copyKey").addEventListener("click", (e) => {
            copyToClipboard(document.getElementById("key").textContent, e.target);
        });
        document.getElementById("copyIban").addEventListener("click", (e) => {
            copyToClipboard(document.getElementById("iban").textContent, e.target);
        });
        document.getElementById("copyName").addEventListener("click", (e) => {
            copyToClipboard(document.getElementById("name").textContent, e.target);
        });
        document.getElementById("copyBic").addEventListener("click", (e) => {
            copyToClipboard(document.getElementById("bic").textContent, e.target);
        });
        document.getElementById("copyBank").addEventListener("click", (e) => {
            copyToClipboard(document.getElementById("bank").textContent, e.target);
        });

        ["copyKey", "copyIban", "copyName", "copyBic", "copyBank"].forEach(id => {
            document.getElementById(id).addEventListener("mouseover", (e) => resetTooltip(e.target));
        });
    </script>

</body>

</html>
